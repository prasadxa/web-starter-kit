kind = "web"
previewPath = "/"
title = "MediBook — Doctor Appointment System"
version = "1.0.0"
id = "artifacts/hospital-appointment"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25066

[services.development]
run = "pnpm --filter @workspace/hospital-appointment run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/hospital-appointment", "run", "build" ]
publicDir = "artifacts/hospital-appointment/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25066"
BASE_PATH = "/"
